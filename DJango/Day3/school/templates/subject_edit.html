{% extends 'base.html' %}
{% load static %}

{% block title %}Edit Subject - ITI School{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/subjects.css' %}">
{% endblock %}

{% block content %}
<div class="main">
  <div class="form-card">
    <h1><i class="fa-solid fa-edit"></i> {% if subject %}Edit{% else %}Add{% endif %} Subject</h1>
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label for="name">Subject Name</label>
        <input type="text" id="name" name="name" placeholder="Enter subject name" value="{{ subject.name|default:'' }}"
          required>
      </div>
      <div class="form-group">
        <label for="description">Description</label>
        <textarea id="description" name="description"
          placeholder="Brief description about the subject...">{{ subject.description|default:'' }}</textarea>
      </div>
      <div class="button-group">
        <button type="submit" class="btn-submit">
          <i class="fa-solid fa-save"></i> {% if subject %}Update{% else %}Create{% endif %} Subject
        </button>
        <a href="{% url 'subjects' %}" class="btn-cancel">
          <i class="fa-solid fa-times"></i> Cancel
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
