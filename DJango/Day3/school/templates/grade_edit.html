{% extends 'base.html' %}
{% load static %}

{% block title %}Edit Grade - ITI School{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/grades.css' %}">
{% endblock %}

{% block content %}
<div class="main">
  <div class="form-card">
    <h1><i class="fa-solid fa-edit"></i> Edit Grade</h1>
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label for="student">Student</label>
        <select id="student" name="student" disabled>
          <option selected>{{ grade.student.name }}</option>
        </select>
      </div>
      <div class="form-group">
        <label for="subject">Subject</label>
        <select id="subject" name="subject" disabled>
          <option selected>{{ grade.subject.name }}</option>
        </select>
      </div>
      <div class="form-group">
        <label for="value">Grade</label>
        <input type="number" id="value" name="value" placeholder="Enter grade (0-100)" min="0" max="100" step="0.5"
          value="{{ grade.value }}" required>
      </div>
      <div class="button-group">
        <button type="submit" class="btn-submit">
          <i class="fa-solid fa-save"></i> Update Grade
        </button>
        <a href="{% url 'grades' %}" class="btn-cancel">
          <i class="fa-solid fa-times"></i> Cancel
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
